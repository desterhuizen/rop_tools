# ROP Tools Suite - Project Configuration
# This file configures black, isort, and other Python tools

[tool.black]
line-length = 88
target-version = ['py38', 'py39', 'py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    # Directories
    \.git
  | \.venv
  | venv
  | env
  | build
  | dist
  | \.egg-info
  | htmlcov
  | \.pytest_cache
  | \.mypy_cache
)/
'''

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_gitignore = true
skip = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "env",
    "build",
    "dist",
    "*.egg-info",
    "htmlcov",
    ".pytest_cache",
    ".mypy_cache"
]

# Group imports: stdlib, third-party, first-party, local
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
known_first_party = ["lib", "shellgen", "rop"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Set to true for strict type checking
ignore_missing_imports = true  # Many dependencies don't have type stubs
show_error_codes = true
pretty = true
explicit_package_bases = true

# Exclude directories
exclude = [
    "^build/",
    "^dist/",
    "^\\.venv/",
    "^venv/",
    "^env/",
    "^\\.git/",
]