name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-lint.txt

    - name: Run flake8
      run: |
        echo "=========================================="
        echo "Running flake8 (PEP 8 style checker)"
        echo "=========================================="
        flake8 lib/ rop/ shellgen/ code_snippets/ --statistics

    - name: Run black (check only)
      run: |
        echo "=========================================="
        echo "Running black (code formatter check)"
        echo "=========================================="
        black --check --diff lib/ rop/ shellgen/ code_snippets/

    - name: Run isort (check only)
      run: |
        echo "=========================================="
        echo "Running isort (import sorting check)"
        echo "=========================================="
        isort --check-only --diff lib/ rop/ shellgen/ code_snippets/

    - name: Run mypy (type checking)
      continue-on-error: true  # Don't fail the build on type errors (yet)
      run: |
        echo "=========================================="
        echo "Running mypy (optional type checking)"
        echo "=========================================="
        mypy lib/ rop/ shellgen/ code_snippets/ || true

    - name: Lint Summary
      if: always()
      run: |
        echo "=========================================="
        echo "Linting Completed"
        echo "=========================================="
        echo "All code quality checks have been run."
        echo "Check the output above for any issues."