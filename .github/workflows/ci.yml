name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements-lint.txt

    - name: flake8
      run: flake8 lib/ rop/ shellgen/ code_snippets/ target_builder/ --statistics

    - name: black
      run: black --check --diff lib/ rop/ shellgen/ code_snippets/ target_builder/

    - name: isort
      run: isort --check-only --diff lib/ rop/ shellgen/ code_snippets/ target_builder/

    - name: mypy
      continue-on-error: true
      run: mypy lib/ rop/ shellgen/ code_snippets/ target_builder/ || true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m unittest discover -s lib/tests -p "test_*.py" -t . -v
        python -m unittest discover -s rop/tests -p "test_*.py" -t . -v
        python -m unittest discover -s shellgen/tests -p "test_*.py" -t . -v
        python -m unittest discover -s target_builder/tests -p "test_*.py" -t . -v

    - name: Generate coverage
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      run: |
        pip install coverage
        coverage run -m unittest discover -s lib/tests -p "test_*.py" -t .
        coverage run -a -m unittest discover -s rop/tests -p "test_*.py" -t .
        coverage run -a -m unittest discover -s shellgen/tests -p "test_*.py" -t .
        coverage run -a -m unittest discover -s target_builder/tests -p "test_*.py" -t .
        coverage report -m
        coverage xml
        coverage html

    - name: Upload to Codecov
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: codecov/codecov-action@v5
      with:
        files: coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

    - name: Coverage summary
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      run: |
        echo "### Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        coverage report >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Upload coverage HTML report
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30